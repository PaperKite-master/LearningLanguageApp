services:
  db:
    image: postgres:16-alpine
    container_name: learning_language_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_language_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learning_language_app"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
